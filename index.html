<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Buy vs Rent</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #111827;
            color: #E5E7EB;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 0; width: 100%; overflow-x: hidden;
        }
        .container { width: 100%; max-width: 1100px; margin: 0 auto; padding: 20px 16px; }
        header { text-align: center; margin-bottom: 25px; }
        h1 { color: #FFFFFF; font-size: 1.6rem; margin: 0 0 8px 0; }
        .subtitle { color: #9CA3AF; font-size: 14px; }
        .grid-main { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 1024px) { .grid-main { grid-template-columns: 1fr 2fr; } }
        .card { background-color: #1F2937; padding: 24px; border-radius: 12px; border: 1px solid #374151; width: 100%; }
        .card-blue { border-left: 5px solid #3B82F6; }
        .card-green { border-left: 5px solid #10B981; }
        .big-number { font-size: 2.2rem; font-weight: 900; color: #FFFFFF; margin: 10px 0; }
        .sub-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 1024px) { 
            .sub-grid { grid-template-columns: 1fr 1fr; }
            .border-split { border-right: 1px solid #374151; padding-right: 20px; }
        }
        .form-group { margin-bottom: 20px; }
        .form-header { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 10px; color: #9CA3AF; }
        .badge { background-color: #111827; color: #3B82F6; font-weight: bold; padding: 2px 10px; border-radius: 6px; border: 1px solid #374151; }
        input[type=range] { width: 100%; height: 8px; background: #4B5563; border-radius: 4px; outline: none; -webkit-appearance: none; cursor: pointer; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 26px; height: 26px; background: #3B82F6; border-radius: 50%; border: 3px solid #FFFFFF; box-shadow: 0 2px 6px rgba(0,0,0,0.5); }
        #chart-wrapper { height: 350px; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>購屋 vs 租屋投資對比</h1>
    </header>

    <div class="grid-main">
        <div>
            <div class="card card-blue" style="margin-bottom: 15px;">
                <div style="font-size: 12px; font-weight: bold; color: #9CA3AF; letter-spacing: 1px;"><span class="dynamic-year">--</span>年後 購屋組淨資產</div>
                <div class="big-number" id="res-buy">-- 萬</div>
                <div style="font-size: 14px; color: #9CA3AF;">月繳房貸: <span id="res-mPay" style="color: #FFF;">--</span> 元</div>
            </div>

            <div class="card card-green">
                <div style="font-size: 12px; font-weight: bold; color: #9CA3AF; letter-spacing: 1px;"><span class="dynamic-year">--</span>年後 租屋組資產</div>
                <div class="big-number" id="res-rent">-- 萬</div>
                <div style="font-size: 14px; color: #9CA3AF;">初始本金: <span id="res-init" style="color: #10B981;">--</span> 萬</div>
            </div>
        </div>

        <div>
            <div class="card" style="margin-bottom: 20px;">
                <div id="chart-wrapper"><canvas id="mainChart"></canvas></div>
            </div>

            <div class="card">
                <div class="sub-grid">
                    <div class="border-split">
                        <div style="font-size: 13px; font-weight: bold; color: #6B7280; margin-bottom: 20px; text-transform: uppercase;">房屋與貸款設定</div>
                        <div class="form-group">
                            <div class="form-header"><span>房屋總價</span><span class="badge"><span id="v-price">2500</span>萬</span></div>
                            <input type="range" id="price" min="500" max="8000" step="50" value="2500" oninput="update()">
                        </div>
                        <div class="form-group">
                            <div class="form-header"><span>裝潢與規費投入</span><span class="badge"><span id="v-initCost">200</span>萬</span></div>
                            <input type="range" id="initCost" min="0" max="1000" step="10" value="200" oninput="update()">
                        </div>
                        <div class="form-group">
                            <div class="form-header"><span>頭期款比例</span><span class="badge"><span id="v-down">30</span>%</span></div>
                            <input type="range" id="down" min="10" max="100" step="5" value="30" oninput="update()">
                        </div>
                        <div class="form-group">
                            <div class="form-header"><span>貸款年限</span><span class="badge" style="color:#FFF;"><span id="v-lYear">30</span>年</span></div>
                            <input type="range" id="lYear" min="10" max="40" step="1" value="30" oninput="update()">
                        </div>
                        <div class="form-group">
                            <div class="form-header"><span>房貸利率</span><span class="badge"><span id="v-lRate">2.50</span>%</span></div>
                            <input type="range" id="lRate" min="1.0" max="6.0" step="0.01" value="2.50" oninput="update()">
                        </div>
                    </div>

                    <div>
                        <div style="font-size: 13px; font-weight: bold; color: #6B7280; margin-bottom: 20px; text-transform: uppercase;">投資與租屋預測</div>
                        <div class="form-group">
                            <div class="form-header"><span>房價平均年增率</span><span class="badge" style="color:#10B981;"><span id="v-hApp">5.0</span>%</span></div>
                            <input type="range" id="hApp" min="0" max="15" step="0.1" value="5.0" oninput="update()">
                        </div>
                        <div class="form-group">
                            <div class="form-header"><span>股市年化報酬率</span><span class="badge" style="color:#10B981;"><span id="v-iRet">8.0</span>%</span></div>
                            <input type="range" id="iRet" min="0" max="20" step="0.1" value="8.0" oninput="update()">
                        </div>
                        <div class="form-group">
                            <div class="form-header"><span>起始月租金</span><span class="badge"><span id="v-rent">3.0</span>萬</span></div>
                            <input type="range" id="rent" min="1" max="15" step="0.1" value="3.0" oninput="update()">
                        </div>
                        <div class="form-group">
                            <div class="form-header"><span>租金年通膨率</span><span class="badge"><span id="v-rInf">2.0</span>%</span></div>
                            <input type="range" id="rInf" min="0" max="10" step="0.1" value="2.0" oninput="update()">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let myChart;
    Chart.defaults.color = '#9CA3AF';
    Chart.defaults.borderColor = 'rgba(75, 85, 99, 0.2)';

    function pmvt(rate, nper, pv) {
        if (rate === 0) return pv / nper;
        return (pv * rate * Math.pow(1 + rate, nper)) / (Math.pow(1 + rate, nper) - 1);
    }

    function update() {
        const p = parseFloat(document.getElementById('price').value);
        const ic = parseFloat(document.getElementById('initCost').value);
        const d = parseFloat(document.getElementById('down').value) / 100;
        const ly = parseInt(document.getElementById('lYear').value);
        const lr_annual = parseFloat(document.getElementById('lRate').value) / 100;
        const lr_monthly = lr_annual / 12;
        const ha = parseFloat(document.getElementById('hApp').value) / 100;
        const ir_annual = parseFloat(document.getElementById('iRet').value) / 100;
        const r = parseFloat(document.getElementById('rent').value) * 10000;
        const ri = parseFloat(document.getElementById('rInf').value) / 100;

        document.getElementById('v-price').innerText = p;
        document.getElementById('v-initCost').innerText = ic;
        document.getElementById('v-down').innerText = d * 100;
        document.getElementById('v-lYear').innerText = ly;
        document.getElementById('v-lRate').innerText = (lr_annual * 100).toFixed(2);
        document.getElementById('v-hApp').innerText = (ha * 100).toFixed(1);
        document.getElementById('v-iRet').innerText = (ir_annual * 100).toFixed(1);
        document.getElementById('v-rent').innerText = (r / 10000).toFixed(1);
        document.getElementById('v-rInf').innerText = (ri * 100).toFixed(1);
        document.querySelectorAll('.dynamic-year').forEach(el => el.innerText = ly);

        const loanAmt = p * (1 - d);
        const mPay = pmvt(lr_monthly, ly * 12, loanAmt);
        const rentInitSum = (p * d) + ic;
        document.getElementById('res-init').innerText = Math.round(rentInitSum).toLocaleString();

        let buyData = [];
        let rentData = [];
        let labels = [];
        let investBalance = rentInitSum; 
        let curRent = r;

        for (let year = 0; year <= ly; year++) {
            // --- 購屋組：計算淨資產 (市值 - 剩餘貸款) ---
            let currentHouseValue = p * Math.pow(1 + ha, year);
            let remainingLoan = 0;
            
            if (year < ly) {
                let n = ly * 12; // 總期數
                let k = year * 12; // 已繳期數
                // 剩餘本金公式: 本金 * [(1+r)^n - (1+r)^k] / [(1+r)^n - 1]
                remainingLoan = loanAmt * (Math.pow(1 + lr_monthly, n) - Math.pow(1 + lr_monthly, k)) / (Math.pow(1 + lr_monthly, n) - 1);
            }
            buyData.push(Math.round(currentHouseValue - remainingLoan));
            labels.push("Y" + year);

            // --- 租屋組：改為年複合增長邏輯 ---
            if (year > 0) {
                // 年度可存金額 = (月房貸 - 當年租金) * 12個月
                let annualSavings = ((mPay * 10000) - curRent) * 12 / 10000;
                // 每年年底結算投入並計算年複利
                investBalance = (investBalance + annualSavings) * (1 + ir_annual);
                // 租金年度增長
                curRent *= (1 + ri);
            }
            rentData.push(Math.round(investBalance));
        }

        document.getElementById('res-buy').innerText = buyData[ly].toLocaleString() + " 萬";
        document.getElementById('res-rent').innerText = Math.round(investBalance).toLocaleString() + " 萬";
        document.getElementById('res-mPay').innerText = Math.round(mPay * 10000).toLocaleString();

        const ctx = document.getElementById('mainChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    { 
                        label: '購屋組 (淨資產)', data: buyData, borderColor: '#3B82F6', backgroundColor: 'rgba(59, 130, 246, 0.3)', 
                        fill: true, tension: 0.3, pointRadius: 0, borderWidth: 2.5
                    },
                    { 
                        label: '租屋組 (資產)', data: rentData, borderColor: '#10B981', backgroundColor: 'rgba(16, 185, 129, 0.2)', 
                        fill: true, tension: 0.3, pointRadius: 0, borderWidth: 2.5
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { 
                    legend: { position: 'top', labels: { boxWidth: 12, font: { size: 11 } } },
                    tooltip: { mode: 'index', intersect: false }
                },
                scales: { 
                    y: { ticks: { callback: v => v + '萬', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.05)' } },
                    x: { ticks: { font: { size: 10 } }, grid: { display: false } }
                }
            }
        });
    }
    update();
</script>
</body>
</html>
