<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy v.s. Rent</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* 1. 基礎重置：防止所有元素撐破寬度 */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* 優化 iPhone 點擊效果 */
        }

        body {
            background-color: #111827;
            color: #E5E7EB;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            width: 100%;
            overflow-x: hidden; /* 徹底禁止橫向捲動 */
        }

        /* 2. 容器置中：使用 margin: auto 的雙重保險 */
        .container {
            width: 100%;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
            padding: 20px 16px; /* 左右各留 16px 呼吸空間 */
            display: block; /* 確保它是塊級元素 */
        }

        /* 3. 標題與卡片 */
        header { 
            text-align: center; 
            margin-bottom: 30px; 
            padding: 0 10px;
        }
        
        h1 { color: #FFFFFF; font-size: 1.5rem; margin-bottom: 8px; }

        .grid-main { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 20px; 
        }

        /* 4. 電腦版佈局 */
        @media (min-width: 1024px) {
            .grid-main { grid-template-columns: 1fr 2fr; }
        }

        /* 5. 組件樣式 */
        .card {
            background-color: #1F2937;
            padding: 24px;
            border-radius: 12px;
            border: 1px solid #374151;
            width: 100%; /* 確保卡片填滿容器 */
        }
        
        .card-blue { border-left: 4px solid #3B82F6; }
        .card-green { border-left: 4px solid #10B981; }

        /* 滑桿與表單優化 */
        .form-group { margin-bottom: 18px; }
        .form-header { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; color: #9CA3AF; }
        .badge { background-color: #374151; color: #3B82F6; font-weight: bold; padding: 2px 8px; border-radius: 4px; }
        input[type=range] { width: 100%; height: 8px; background: #4B5563; border-radius: 4px; outline: none; -webkit-appearance: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; background: #3B82F6; border-radius: 50%; border: 2px solid #E5E7EB; }
        
        .sub-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .big-number { font-size: 2rem; font-weight: 900; color: #FFFFFF; margin: 8px 0; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>購屋 vs 租屋投資對比</h1>
    </header>

    <div class="grid-main">
        <div>
            <div class="card card-blue">
                <div style="font-size: 12px; font-weight: bold; color: #9CA3AF; letter-spacing: 1px;">購屋組最終資產 (30年後)</div>
                <div class="big-number" id="res-buy">-- 萬</div>
                <div style="font-size: 14px; color: #9CA3AF;">月繳房貸: <span id="res-mPay" style="color: #FFF;">--</span> 元</div>
            </div>

            <div class="card card-green">
                <div style="font-size: 12px; font-weight: bold; color: #9CA3AF; letter-spacing: 1px;">租屋組最終資產 (30年後)</div>
                <div class="big-number" id="res-rent">-- 萬</div>
                <div style="font-size: 14px; color: #9CA3AF;">含初始投入 <span id="res-init" style="color: #10B981;">--</span> 萬與每月存金複利</div>
            </div>
            
            <div class="footer-note">
                * 租屋組初始投入 = (總價 × 頭期%) + 裝潢雜費
            </div>
        </div>

        <div>
            <div class="card" style="height: 380px;">
                <canvas id="mainChart"></canvas>
            </div>

            <div class="card">
                <div class="sub-grid">
                    <div style="border-right: 1px solid #374151; padding-right: 15px;">
                        <div style="font-size: 14px; font-weight: bold; color: #9CA3AF; margin-bottom: 15px; border-bottom: 1px solid #374151; padding-bottom: 5px;">房屋與貸款</div>
                        
                        <div class="form-group">
                            <div class="form-header"><span>房屋總價</span><span class="badge"><span id="v-price">2500</span>萬</span></div>
                            <input type="range" id="price" min="500" max="8000" step="50" value="2500" oninput="update()">
                        </div>

                        <div class="form-group">
                            <div class="form-header"><span>裝潢與雜費投入</span><span class="badge"><span id="v-initCost">200</span>萬</span></div>
                            <input type="range" id="initCost" min="0" max="1000" step="10" value="200" oninput="update()">
                        </div>

                        <div class="sub-grid">
                            <div class="form-group">
                                <div class="form-header"><span>頭期款 %</span><span id="v-down">30</span></div>
                                <input type="range" id="down" min="10" max="100" step="5" value="30" oninput="update()">
                            </div>
                            <div class="form-group">
                                <div class="form-header"><span>貸款年限</span><span id="v-lYear">30</span></div>
                                <input type="range" id="lYear" min="10" max="40" step="5" value="30" oninput="update()">
                            </div>
                        </div>

                        <div class="form-group">
                            <div class="form-header"><span>房貸利率</span><span class="badge"><span id="v-lRate">2.33</span>%</span></div>
                            <input type="range" id="lRate" min="1.0" max="6.0" step="0.01" value="2.33" oninput="update()">
                        </div>
                    </div>

                    <div>
                        <div style="font-size: 14px; font-weight: bold; color: #9CA3AF; margin-bottom: 15px; border-bottom: 1px solid #374151; padding-bottom: 5px;">投資與租屋</div>
                        
                        <div class="form-group">
                            <div class="form-header"><span>房價年增率</span><span class="badge-green badge"><span id="v-hApp">3.0</span>%</span></div>
                            <input type="range" id="hApp" min="0" max="15" step="0.1" value="6.0" oninput="update()">
                        </div>

                        <div class="form-group">
                            <div class="form-header"><span>股市年化報酬</span><span class="badge-green badge"><span id="v-iRet">8.0</span>%</span></div>
                            <input type="range" id="iRet" min="0" max="20" step="0.1" value="8.0" oninput="update()">
                        </div>

                        <div class="sub-grid">
                            <div class="form-group">
                                <div class="form-header"><span>起始月租(萬)</span><span id="v-rent">3.0</span></div>
                                <input type="range" id="rent" min="1" max="15" step="0.1" value="3.0" oninput="update()">
                            </div>
                            <div class="form-group">
                                <div class="form-header"><span>租金年增 %</span><span id="v-rInf">2.0</span></div>
                                <input type="range" id="rInf" min="0" max="10" step="0.1" value="2.0" oninput="update()">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let myChart;
    Chart.defaults.color = '#9CA3AF';
    Chart.defaults.borderColor = 'rgba(75, 85, 99, 0.3)';

    function pmvt(rate, nper, pv) {
        if (rate === 0) return pv / nper;
        return (pv * rate * Math.pow(1 + rate, nper)) / (Math.pow(1 + rate, nper) - 1);
    }

    function update() {
        const p = parseFloat(document.getElementById('price').value);
        const d = parseFloat(document.getElementById('down').value) / 100;
        const lr = parseFloat(document.getElementById('lRate').value) / 100 / 12;
        const ly = parseInt(document.getElementById('lYear').value);
        const ha = parseFloat(document.getElementById('hApp').value) / 100;
        const ir = parseFloat(document.getElementById('iRet').value) / 100 / 12;
        const r = parseFloat(document.getElementById('rent').value) * 10000;
        const ri = parseFloat(document.getElementById('rInf').value) / 100;
        const ic = parseFloat(document.getElementById('initCost').value);

        document.getElementById('v-price').innerText = p;
        document.getElementById('v-down').innerText = d * 100;
        document.getElementById('v-lYear').innerText = ly;
        document.getElementById('v-lRate').innerText = (lr * 12 * 100).toFixed(2);
        document.getElementById('v-hApp').innerText = (ha * 100).toFixed(1);
        document.getElementById('v-iRet').innerText = (ir * 12 * 100).toFixed(1);
        document.getElementById('v-rent').innerText = (r / 10000).toFixed(1);
        document.getElementById('v-rInf').innerText = (ri * 100).toFixed(1);
        document.getElementById('v-initCost').innerText = ic;

        const loanAmt = p * (1 - d);
        const mPay = pmvt(lr, ly * 12, loanAmt);
        const rentInitSum = (p * d) + ic;
        document.getElementById('res-init').innerText = rentInitSum.toLocaleString();

        let buyData = [];
        let rentData = [];
        let labels = [];

        let investBalance = rentInitSum; 
        let curRent = r;

        for (let year = 0; year <= 30; year++) {
            buyData.push(Math.round(p * Math.pow(1 + ha, year)));
            labels.push("Y" + year);

            if (year > 0) {
                for (let m = 1; m <= 12; m++) {
                    let delta = ((mPay * 10000) - curRent) / 10000;
                    investBalance = (investBalance + delta) * (1 + ir);
                }
                curRent *= (1 + ri);
            }
            rentData.push(Math.round(investBalance));
        }

        document.getElementById('res-buy').innerText = buyData[30].toLocaleString() + " 萬";
        document.getElementById('res-rent').innerText = Math.round(investBalance).toLocaleString() + " 萬";
        document.getElementById('res-mPay').innerText = Math.round(mPay * 10000).toLocaleString();

        const ctx = document.getElementById('mainChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    { 
                        label: '購屋組', data: buyData, borderColor: '#3B82F6', backgroundColor: 'rgba(59, 130, 246, 0.4)', 
                        fill: true, tension: 0.3, pointRadius: 0, borderWidth: 2
                    },
                    { 
                        label: '租屋組', data: rentData, borderColor: '#10B981', backgroundColor: 'rgba(16, 185, 129, 0.3)', 
                        fill: true, tension: 0.3, pointRadius: 0, borderWidth: 2
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { position: 'top' }, tooltip: { mode: 'index', intersect: false } },
                scales: { y: { ticks: { callback: v => v + '萬' } } }
            }
        });
    }
    update();
</script>
</body>
</html>
